# Sample gold standard Q&A pairs for automated validation
# domain: matches the document domain (IT, Finance, null=all)
# gold_answer: the expected high-quality answer to compare against

questions:
  - question_text: "What are the password requirements for employees?"
    gold_answer: >
      Employees must use passwords that are at least 12 characters long.
      Passwords must be changed every 90 days. Shared credentials are strictly prohibited.
    domain: IT

  - question_text: "What is required when accessing restricted data?"
    gold_answer: >
      Restricted data must be encrypted both at rest and in transit.
      Access to Restricted data requires manager approval and all access is logged.
    domain: IT

  - question_text: "What should employees do if a security incident occurs?"
    gold_answer: >
      Security incidents must be reported to the IT Security team within 1 hour of discovery.
      The incident response team will assess severity and initiate containment procedures.
      All incidents are logged and reviewed quarterly.
    domain: IT

  - question_text: "What is the expense reporting deadline?"
    gold_answer: >
      All employee expenses must be submitted within 30 days of incurrence.
      Expenses over $500 require manager approval. Receipts are mandatory for all expenses over $25.
    domain: Finance

  - question_text: "When do vendor invoices require two signatories?"
    gold_answer: >
      All vendor invoices must be approved by two signatories when the amount exceeds $10,000.
      Payment terms are net-30 by default.
    domain: Finance

  - question_text: "What MFA method is required for system access?"
    gold_answer: >
      All employees must use multi-factor authentication (MFA) when accessing company systems.
    domain: IT

  - question_text: "What happens if a department exceeds its budget by more than 10%?"
    gold_answer: >
      Unplanned expenditures over 10% of the quarterly budget must be escalated to the Finance Director.
    domain: Finance
